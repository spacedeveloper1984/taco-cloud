<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Taco Cloud</title>
    <link rel="stylesheet" th:href="@{/styles.css}"/>
</head>
<body>
<form method="POST" th:action="@{/orders}" th:object="${tacoOrder}">
    <h1>Order your taco creations!</h1>
    <img th:src="@{/images/taco-cloud.png}"/>
    <h3>Your tacos in this order:</h3>
    <a th:href="@{/design}" id="another">Design another taco</a><br/>
    <ul>
        <li th:each="taco : ${tacoOrder.tacos}">
            <span th:text="${taco.name}">taco name</span></li>
    </ul>
    <h3>Deliver my taco masterpieces to...</h3>
    <label for="deliveryName">Name: </label>
    <input type="text" th:field="*{deliveryName}"/>
    <span th:each="error : ${#fields.errors('deliveryName')}" class="validationError" th:if="${#fields.hasErrors('deliveryName')}" th:text="${error}"></span>
    <br/>
    <label for="deliveryStreet">Street address: </label>
    <input type="text" th:field="*{deliveryStreet}"/>
    <span th:each="error : ${#fields.errors('deliveryStreet')}" class="validationError" th:if="${#fields.hasErrors('deliveryStreet')}" th:text="${error}"></span>
    <br/>
    <label for="deliveryCity">City: </label>
    <input type="text" th:field="*{deliveryCity}"/>
    <span th:each="error : ${#fields.errors('deliveryCity')}" class="validationError" th:if="${#fields.hasErrors('deliveryCity')}" th:text="${error}"></span>
    <br/>
    <label for="deliveryState">State: </label>
    <input type="text" th:field="*{deliveryState}"/>
    <span th:each="error : ${#fields.errors('deliveryState')}" class="validationError" th:if="${#fields.hasErrors('deliveryState')}" th:text="${error}"></span>
    <br/>
    <label for="deliveryZip">Zip code: </label>
    <input type="text" th:field="*{deliveryZip}"/>
    <span th:each="error : ${#fields.errors('deliveryZip')}" class="validationError" th:if="${#fields.hasErrors('deliveryZip')}" th:text="${error}"></span>
    <br/>
    <h3>Here’s how I’ll pay...</h3>
    <label for="ccNumber">Credit Card #: </label>
    <input type="text" th:field="*{ccNumber}"/>
    <span th:each="error : ${#fields.errors('ccNumber')}" class="validationError" th:if="${#fields.hasErrors('ccNumber')}" th:text="${error}"></span>
    <br/>
    <label for="ccExpiration">Expiration: </label>
    <input type="text" th:field="*{ccExpiration}"/>
    <span th:each="error : ${#fields.errors('ccExpiration')}"  class="validationError" th:if="${#fields.hasErrors('ccExpiration')}" th:text="${error}"></span>
    <br/>
    <label for="ccCVV">CVV: </label>
    <input type="text" th:field="*{ccCVV}"/>
    <span th:each="error : ${#fields.errors('ccCVV')}"  class="validationError" th:if="${#fields.hasErrors('ccCVV')}" th:text="${error}"></span>
    <br/>
    <input type="submit" value="Submit Order"/>
</form>
</body>
</html>
