<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Taco Cloud</title>
    <link rel="stylesheet" th:href="@{styles.css}"/>
</head>
<body>
<h1>Design your taco!</h1>
<img th:src="@{/images/taco-cloud.png}"/>
<form method="POST" th:object="${taco}">
    <div class="grid">
        <div class="ingredient-group" id="wraps">
            <h3>Designate your wrap:</h3>
            <div th:each="ingredient : ${wrap}">
                <input th:field="*{ingredients}" type="checkbox" th:value="${ingredient.id}"/>
                <span th:text="${ingredient.name}">INGREDIENT</span>
            </div>
            <span th:each="error : ${#fields.errors('wrap')}" class="validationError" th:if="${#fields.hasErrors('wrap')}" th:text="${error}"></span>
        </div>
        <div class="ingredient-group" id="proteins">
            <h3>Pick your protein:</h3>
            <div th:each="ingredient : ${protein}">
                <input th:field="*{ingredients}" type="checkbox"
                       th:value="${ingredient.id}"/>
                <span th:text="${ingredient.name}">INGREDIENT</span><br/>
            </div>
            <span th:each="error : ${#fields.errors('protein')}" class="validationError" th:if="${#fields.hasErrors('protein')}" th:text="${error}"></span>
        </div>
        <div class="ingredient-group" id="cheeses">
            <h3>Choose your cheese:</h3>
            <div th:each="ingredient : ${cheese}">
                <input th:field="*{ingredients}" type="checkbox"
                       th:value="${ingredient.id}"/>
                <span th:text="${ingredient.name}">INGREDIENT</span><br/>
            </div>
            <span th:each="error : ${#fields.errors('cheese')}" class="validationError" th:if="${#fields.hasErrors('cheese')}" th:text="${error}"></span>
        </div>
        <div class="ingredient-group" id="veggies">
            <h3>Determine your veggies:</h3>
            <div th:each="ingredient : ${veggies}">
                <input th:field="*{ingredients}" type="checkbox"
                       th:value="${ingredient.id}"/>
                <span th:text="${ingredient.name}">INGREDIENT</span><br/>
            </div>
            <span th:each="error : ${#fields.errors('veggies')}" class="validationError" th:if="${#fields.hasErrors('veggies')}" th:text="${error}"></span>
        </div>
        <div class="ingredient-group" id="sauces">
            <h3>Select your sauce:</h3>
            <div th:each="ingredient : ${sauce}">
                <input th:field="*{ingredients}" type="checkbox"
                       th:value="${ingredient.id}"/>
                <span th:text="${ingredient.name}">INGREDIENT</span><br/>
            </div>
            <span th:each="error : ${#fields.errors('sauce')}" class="validationError" th:if="${#fields.hasErrors('sauce')}" th:text="${error}"></span>
        </div>
    </div>
    <div>
        <h3>Name your taco creation:</h3>
        <input type="text" th:field="*{name}"/>
        <span th:each="error : ${#fields.errors('name')}" class="validationError" th:if="${#fields.hasErrors('name')}" th:text="${error}"></span>
        <br/>
        <button>Submit Your Taco</button>
    </div>
</form>
</body>
</html>
